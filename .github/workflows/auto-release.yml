name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-bump:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packaging
        run: python -m pip install --quiet packaging

      - name: Compare pyproject.toml version to PyPI latest
        id: check
        shell: bash
        run: |
          set -euo pipefail

          NEW_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          SHOULD_RELEASE="$(NEW_VERSION="$NEW_VERSION" python - <<'PY'
          import json, os, sys, urllib.error, urllib.request
          from packaging.version import Version, InvalidVersion

          name = "clang-tool-chain"
          new = os.environ["NEW_VERSION"]
          try:
              new_v = Version(new)
          except InvalidVersion:
              sys.exit(f"pyproject.toml version is not PEP 440: {new}")

          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{name}/json", timeout=10) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print(f"PyPI: {name} not yet published — releasing {new}", file=sys.stderr)
                  print("true"); sys.exit(0)
              raise

          current = data.get("info", {}).get("version") or ""
          try:
              cur_v = Version(current) if current else None
          except InvalidVersion:
              cur_v = None

          if cur_v is None:
              print(f"PyPI: no parseable current version — releasing {new}", file=sys.stderr)
              print("true"); sys.exit(0)

          if cur_v < new_v:
              print(f"PyPI {cur_v} < pyproject {new_v} — releasing", file=sys.stderr)
              print("true")
          else:
              print(f"PyPI {cur_v} >= pyproject {new_v} — skipping", file=sys.stderr)
              print("false")
          PY
          )"

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    needs: detect-bump
    if: needs.detect-bump.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate version consistency
        env:
          VERSION: ${{ needs.detect-bump.outputs.version }}
        run: |
          python - <<'PY'
          import os, re, sys
          from pathlib import Path
          version = os.environ["VERSION"]
          version_py = Path("src/clang_tool_chain/__version__.py").read_text(encoding="utf-8")
          m = re.search(r'__version__\s*=\s*"([^"]+)"', version_py)
          if not m:
              sys.exit("could not parse __version__ from src/clang_tool_chain/__version__.py")
          module_version = m.group(1)
          if version != module_version:
              sys.exit(f"version mismatch: pyproject.toml={version} __version__.py={module_version}")
          print(f"version OK: {version}")
          PY

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [detect-bump, preflight]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install build dependencies
        run: |
          uv venv
          uv pip install build twine

      - name: Build package
        run: uv run python -m build

      - name: Check package
        run: uv run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [detect-bump, build]
    environment:
      name: pypi
      url: https://pypi.org/p/clang-tool-chain
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          skip-existing: true
